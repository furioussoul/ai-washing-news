<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 抽奖神器 - 20秒生成的震撼效果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .lucky-font {
            font-family: 'ZCOOL+KuaiLe', cursive;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-white">

    <!-- 顶部标题 -->
    <div class="mb-8 text-center animate-bounce">
        <h1 class="text-4xl md:text-6xl font-black mb-2 lucky-font tracking-widest text-yellow-300 drop-shadow-lg">
            幸运大抽奖
        </h1>
        <p class="text-sm opacity-80 uppercase tracking-tighter">Powered by AI - 20 Seconds Generation</p>
    </div>

    <!-- 主容器 -->
    <div class="glass-morphism rounded-3xl p-8 w-full max-w-2xl flex flex-col items-center">
        
        <!-- 滚动展示区 -->
        <div id="display-area" class="w-full h-48 flex items-center justify-center mb-8 border-b-2 border-white/20">
            <div id="lucky-name" class="text-6xl md:text-8xl font-bold lucky-font text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 drop-shadow-2xl text-center">
                准备就绪
            </div>
        </div>

        <!-- 设置区 -->
        <div id="setup-section" class="w-full space-y-4 transition-all duration-500">
            <label class="block text-sm font-medium text-blue-100">输入名单 (每行一个名字)</label>
            <textarea id="name-input" class="w-full h-32 p-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/40 focus:ring-2 focus:ring-yellow-400 outline-none transition-all" placeholder="张三&#10;李四&#10;王五..."></textarea>
        </div>

        <!-- 按钮区 -->
        <div class="mt-8 flex gap-4">
            <button id="start-btn" onclick="toggleLottery()" class="px-12 py-4 bg-yellow-400 hover:bg-yellow-300 text-purple-900 font-bold text-2xl rounded-full transform hover:scale-105 active:scale-95 transition-all shadow-xl lucky-font">
                开始抽奖
            </button>
            <button id="reset-btn" onclick="resetApp()" class="px-6 py-4 bg-white/10 hover:bg-white/20 text-white font-medium rounded-full transition-all border border-white/20">
                重置
            </button>
        </div>

    </div>

    <!-- 提示 -->
    <p class="mt-8 text-white/50 text-xs italic">点击“开始”见证奇迹时刻</p>

    <script>
        let intervalId = null;
        let isRunning = false;
        let names = [];

        const display = document.getElementById('lucky-name');
        const inputArea = document.getElementById('setup-section');
        const startBtn = document.getElementById('start-btn');
        const nameInput = document.getElementById('name-input');

        // 默认名单
        nameInput.value = "前端开发\n后端架构\n产品经理\n设计大神\n测试专家\n运营大咖\nAI 工程师";

        function toggleLottery() {
            if (!isRunning) {
                // 开始抽奖
                const rawInput = nameInput.value.trim();
                if (!rawInput) {
                    alert("请输入名单！");
                    return;
                }
                names = rawInput.split('\n').filter(name => name.trim() !== '');
                if (names.length < 2) {
                    alert("名单太少啦，多加几个！");
                    return;
                }

                isRunning = true;
                startBtn.innerText = "停止";
                startBtn.classList.replace('bg-yellow-400', 'bg-red-500');
                startBtn.classList.replace('text-purple-900', 'text-white');
                inputArea.classList.add('opacity-0', 'pointer-events-none', 'scale-90');

                intervalId = setInterval(() => {
                    const randomIndex = Math.floor(Math.random() * names.length);
                    display.innerText = names[randomIndex];
                }, 50);

            } else {
                // 停止抽奖
                stopLottery();
            }
        }

        function stopLottery() {
            clearInterval(intervalId);
            isRunning = false;
            startBtn.innerText = "再抽一次";
            startBtn.classList.replace('bg-red-500', 'bg-green-500');
            startBtn.classList.add('animate-bounce');

            // 纸屑爆炸效果
            fireConfetti();
            
            // 结果文字特效
            display.classList.add('scale-110');
            setTimeout(() => display.classList.remove('scale-110'), 200);
        }

        function fireConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function resetApp() {
            clearInterval(intervalId);
            isRunning = false;
            display.innerText = "准备就绪";
            startBtn.innerText = "开始抽奖";
            startBtn.className = "px-12 py-4 bg-yellow-400 hover:bg-yellow-300 text-purple-900 font-bold text-2xl rounded-full transform hover:scale-105 active:scale-95 transition-all shadow-xl lucky-font";
            inputArea.classList.remove('opacity-0', 'pointer-events-none', 'scale-90');
        }
    </script>
</body>
</html>
